name: SmartPark AI - Build & Test Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    name: SmartPark AI Real Testing
    runs-on: ubuntu-latest
    
    env:
      PYTHONPATH: ${{ github.workspace }}
      AZURE_API_KEY: ${{ secrets.AZURE_API_KEY }}
      AZURE_API_VERSION: ${{ secrets.AZURE_API_VERSION }}
      AZURE_ENDPOINT: ${{ secrets.AZURE_ENDPOINT }}
      AZURE_DEPLOYMENT_NAME: ${{ secrets.AZURE_DEPLOYMENT_NAME }}
      AZURE_EMBEDDING_DEPLOYMENT: ${{ secrets.AZURE_EMBEDDING_DEPLOYMENT }}
      MILVUS_URI: "http://localhost:19530"
      MILVUS_COLLECTION_NAME: ${{ secrets.MILVUS_COLLECTION_NAME }}
      EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      FASTAPI_MCP_API_KEY: ${{ secrets.FASTAPI_MCP_API_KEY }}
      FASTAPI_MCP_URL: ${{ secrets.FASTAPI_MCP_URL }}
      LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
      LANGSMITH_TRACING: ${{ secrets.LANGSMITH_TRACING }}
      LANGSMITH_PROJECT: ${{ secrets.LANGSMITH_PROJECT }}
      LANGSMITH_ENDPOINT: ${{ secrets.LANGSMITH_ENDPOINT }}
      ADMIN_PANEL_PASSWORD: ${{ secrets.ADMIN_PANEL_PASSWORD }}

    steps:
      # ------------------------------------------------------------
      # Checkout Repository
      # ------------------------------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # Setup Python
      # ------------------------------------------------------------
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ------------------------------------------------------------
      # Start Milvus Database
      # ------------------------------------------------------------
      - name: Start Milvus
        run: |
          if [ -f "docker/milvus/docker-compose.yml" ]; then
            echo "🚀 Starting Milvus with docker-compose..."
            docker compose -f docker/milvus/docker-compose.yml up -d
          else
            echo "⚠️  Milvus docker-compose not found, assuming remote Milvus"
          fi

      # ------------------------------------------------------------
      # Wait for Milvus to be Ready
      # ------------------------------------------------------------
      - name: Wait for Milvus
        run: |
          echo "⏳ Waiting for Milvus to be ready..."
          for i in {1..24}; do
            if curl -f http://localhost:19530/health 2>/dev/null; then
              echo "✅ Milvus is ready!"
              break
            elif curl -f http://localhost:9091/healthz 2>/dev/null; then
              echo "✅ Milvus is ready (alternative port)!"
              break
            else
              echo "Still waiting... ($i/24)"
              sleep 5
            fi
          done
          
          # Check if Milvus is actually running
          if ! curl -f http://localhost:19530/health 2>/dev/null && ! curl -f http://localhost:9091/healthz 2>/dev/null; then
            echo "⚠️  Milvus not responding, but continuing with tests..."
            echo "Using remote Milvus or will handle connection in code"
          fi

      # ------------------------------------------------------------
      # Install Dependencies
      # ------------------------------------------------------------
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ------------------------------------------------------------
      # Debug Environment Variables
      # ------------------------------------------------------------
      - name: Debug Environment
        run: |
          echo "🔍 Environment Check:"
          echo "Python version: $(python --version)"
          echo "AZURE_ENDPOINT: $AZURE_ENDPOINT"
          echo "MILVUS_URI: $MILVUS_URI"
          echo "LANGSMITH_PROJECT: $LANGSMITH_PROJECT"
          python -c "import sys; print('Python path:', sys.path)"

      # ------------------------------------------------------------
      # Run Real Tests with Actual Functionality
      # ------------------------------------------------------------
      - name: Run Real Tests
        run: |
          echo "🧪 Running real tests with actual functionality..."
          python -m pytest tests -v --tb=short --maxfail=5
        continue-on-error: false

      # ------------------------------------------------------------
      # Show Docker Logs on Failure
      # ------------------------------------------------------------
      - name: Show Docker Logs
        if: failure()
        run: |
          echo "🔍 Docker container status:"
          docker ps -a
          echo "📋 Milvus logs:"
          docker logs milvus-standalone || echo "No milvus-standalone container"
          docker logs milvus-etcd || echo "No milvus-etcd container"
          docker logs milvus-minio || echo "No milvus-minio container"

      # ------------------------------------------------------------
      # Test Summary
      # ------------------------------------------------------------
      - name: Test Summary
        if: always()
        run: |
          echo "======================================"
          echo "   SmartPark AI CI Pipeline Summary   "
          echo "======================================"
          echo "✅ Repository Checkout: SUCCESS"
          echo "✅ Python Setup