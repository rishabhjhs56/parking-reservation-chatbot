name: SmartPark AI - Build & Test Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    env:
      CI: "true"
      PYTHONPATH: ${{ github.workspace }}
      # Mock environment variables - no real secrets needed
      AZURE_API_KEY: "mock-azure-key-for-ci"
      AZURE_ENDPOINT: "https://mock-azure.openai.azure.com"
      AZURE_API_VERSION: "2024-02-01"
      AZURE_DEPLOYMENT_NAME: "mock-gpt-deployment"
      AZURE_EMBEDDING_DEPLOYMENT: "mock-embedding-deployment"
      MILVUS_URI: "mock://localhost:19530"
      FASTAPI_MCP_API_KEY: "mock-fastapi-key"
      EMAIL_ADDRESS: "test@example.com"
      ADMIN_EMAIL: "admin@example.com"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests with Mock Data
        run: |
          python -m pytest tests -v --tb=short

      - name: Test Summary
        if: always()
        run: |
          echo "======================================"
          echo "   SmartPark AI CI Test Summary       "
          echo "======================================"
          echo "✅ Tests Case executed successfully"