name: SmartPark AI - Build & Test Pipeline

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:

    name: SmartPark AI Validation

    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:

      # ------------------------------------------------------------
      # Checkout Repository
      # ------------------------------------------------------------

      - name: Checkout Repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # Setup Python
      # ------------------------------------------------------------

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ------------------------------------------------------------
      # Install Dependencies
      # ------------------------------------------------------------

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ------------------------------------------------------------
      # Debug Environment Variables
      # ------------------------------------------------------------

      - name: Debug Environment Variables
        run: |
          python -c "from app.utils.config import MILVUS_URI; print('MILVUS_URI =', MILVUS_URI)"
          

      # ------------------------------------------------------------
      # Start Milvus
      # ------------------------------------------------------------

      - name: Start Milvus
        run: |
          docker compose -f docker/milvus/docker-compose.yml up -d

      # ------------------------------------------------------------
      # Wait For Milvus
      # ------------------------------------------------------------

      - name: Wait for Milvus
        run: |
          echo "Waiting for Milvus..."
          for i in {1..24}; do
            if curl -f http://localhost:9091/healthz; then
              echo "Milvus is ready!"
              exit 0
            fi
            echo "Still waiting..."
            sleep 5
          done
          echo "Milvus failed to start."
          docker ps -a
          docker logs milvus-standalone || true
          exit 1

      # ------------------------------------------------------------
      # Verify Project Imports
      # ------------------------------------------------------------

      - name: Verify Project Imports
        run: |
          python -c "from app.graph.workflow import build_graph"
          python -c "from app.agents.chatbot_agent import ChatbotAgent"
          python -c "from app.agents.admin_agent import AdminAgent"
          python -c "from app.database.sqlite_client import SQLiteClient"

      # ------------------------------------------------------------
      # Execute Test Suite
      # ------------------------------------------------------------

      - name: Run Pytest Test Suite
        run: |
          pytest tests -v

      # ------------------------------------------------------------
      # Print Docker Logs (Only if Failure)
      # ------------------------------------------------------------

      - name: Show Docker Logs
        if: failure()
        run: |
          docker ps -a
          docker logs milvus-standalone || true
          docker logs milvus-etcd || true
          docker logs milvus-minio || true

      # ------------------------------------------------------------
      # Pipeline Summary
      # ------------------------------------------------------------

      - name: Build Summary
        if: always()
        run: |
          echo "======================================"
          echo " SmartPark AI CI Pipeline Completed "
          echo "======================================"
          echo "Repository Checkout      : SUCCESS"
          echo "Python Setup             : SUCCESS"
          echo "Dependency Installation  : SUCCESS"
          echo "Milvus Startup           : COMPLETED"
          echo "Import Validation        : SUCCESS"
          echo "Pytest Execution         : COMPLETED"